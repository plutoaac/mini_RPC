syntax = "proto3";

package rpc;

enum ErrorCode {
  OK = 0;
  METHOD_NOT_FOUND = 1;
  PARSE_ERROR = 2;
  INTERNAL_ERROR = 3;
}

message RpcRequest {
  string request_id = 1;
  string service_name = 2;
  string method_name = 3;
  bytes payload = 4;
}

message RpcResponse {
  string request_id = 1;
  ErrorCode error_code = 2;
  string error_msg = 3;
  bytes payload = 4;
}
